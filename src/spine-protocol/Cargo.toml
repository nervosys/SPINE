[package]
name = "spine-protocol"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Low-latency communication protocols for SPINE"

[features]
default = ["quic"]
quic = ["dep:quinn", "dep:rcgen", "dep:rustls-pki-types"]

[dependencies]
tracing = { workspace = true }
serde.workspace = true
serde_json.workspace = true
# Serialize Vec<u8> tensor/byte payloads as compact CBOR byte strings
# (1-byte overhead) instead of integer arrays.
serde_bytes = "0.11"
anyhow.workspace = true
thiserror.workspace = true
log.workspace = true
tokio.workspace = true
# For high throughput, maybe tonic (gRPC) or a custom binary protocol
# For now, let's stick to basic networking
bytes = "1.5"
zstd = "0.12"
# Compact, self-describing binary wire codec (RFC 8949 CBOR). Handles
# serde_json::Value natively (unlike bincode/postcard, which need deserialize_any).
ciborium = "0.2"
aes-gcm = "0.10"
hmac = "0.12"
sha2 = "0.10"
hkdf = "0.12"
rand = "0.8"
uuid = { version = "1", features = ["v4", "serde"] }
spine-neural = { path = "../spine-neural" }
spine-crypto = { path = "../spine-crypto" }
rustls.workspace = true
tokio-rustls.workspace = true
# High-performance binary serialization (5-10x faster than JSON)
bincode = "1.3"
bytemuck = { version = "1.14", features = ["derive"] }
parking_lot = "0.12"
zeroize = { version = "1.8", features = ["derive"] }

# QUIC transport (optional, for fallback/0-RTT connections)
quinn = { version = "0.11", optional = true }
rcgen = { version = "0.12", optional = true }
rustls-pki-types = { version = "1", optional = true }

[dev-dependencies]
proptest = "1.4"
spine-nostd = { path = "../spine-nostd" }
spine-embedded = { path = "../spine-embedded" }
tokio-test = "0.4"
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "hot_path_bench"
harness = false

[[example]]
name = "wire_sizes"
path = "examples/wire_sizes.rs"
