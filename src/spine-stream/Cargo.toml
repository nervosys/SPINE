[package]
name = "spine-stream"
version = "1.0.0"
edition = "2021"
description = "High-performance streaming layer for SPINE bioinspired agentic web stack"
authors = ["Nervosys"]
license = "Apache-2.0"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full", "sync", "time", "io-util"] }
tokio-stream = { version = "0.1", features = ["sync", "time"] }
futures = "0.3"
async-stream = "0.3"
pin-project-lite = "0.2"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_bytes = "0.11"
bincode = "1.3"
bytes = "1.11"

# Compression
zstd = "0.13"
lz4_flex = "0.11"
crc32fast = "1.4"

# Concurrency
dashmap = "5.5"
parking_lot = "0.12"
crossbeam-channel = "0.5"

# Utilities
thiserror = "2.0"
tracing = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }
quanta = "0.12"

# Internal dependencies
spine-transport = { path = "../spine-transport" }
spine-protocol = { path = "../spine-protocol" }

[dev-dependencies]
tokio-test = "0.4"
criterion = { version = "0.5", features = ["async_tokio"] }

[[bench]]
name = "stream_bench"
harness = false

[features]
default = ["backpressure", "multiplexing"]
backpressure = []
multiplexing = []
priority-queues = []
