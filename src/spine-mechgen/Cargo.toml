[package]
name = "spine-mechgen"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "MechGen ABL <-> SPINE bridge: deserialize ABL spine-bridge envelopes into spine-agentic types (the type-safe join for collaborative agentic SWE)"

[dependencies]
serde.workspace = true
serde_json.workspace = true
uuid = { version = "1", features = ["v4", "serde"] }
# Types only — no need for the wasm-exec sandbox here.
spine-agentic = { path = "../spine-agentic", default-features = false }

[dev-dependencies]
chrono = { version = "0.4", features = ["serde"] }
ed25519-dalek = { workspace = true }

[[example]]
name = "collab_swe"
path = "examples/collab_swe.rs"
