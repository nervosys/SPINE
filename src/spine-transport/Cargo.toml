[package]
name = "spine-transport"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "High-performance zero-copy transport layer for SPINE"

[features]
default = ["tcp", "quic"]
tcp = []
quic = ["dep:quinn", "dep:rcgen", "dep:rustls-pki-types"]
io-uring = ["dep:tokio-uring", "dep:io-uring"]
dpdk = []                                                 # Future: kernel bypass networking
# RDMA (InfiniBand verbs). Linux-only at runtime; requires libibverbs +
# rdma-core. Feature gates the wire impl; the RdmaTransport trait and
# LocalShmRdma loopback are always available.
rdma = []
# GPU-Direct RDMA (NVIDIA ConnectX + GPU peer-memory). Builds the typed stub
# and the registration plumbing; requires CUDA + nv_peer_mem at runtime.
gpu-direct = []

[dependencies]
# Core async runtime
tokio = { workspace = true, features = [
    "net",
    "io-util",
    "sync",
    "time",
    "rt-multi-thread",
    "macros",
] }
futures = "0.3"
async-trait = "0.1"

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
bincode = "1.3"                                     # Binary serialization for performance

# Error handling
anyhow.workspace = true
thiserror.workspace = true

# Logging
log.workspace = true
tracing = "0.1"

# Zero-copy buffers
bytes = "1.11"
memmap2 = "0.9"  # Memory-mapped files
bitflags = "2.11"

# Compression (SIMD-accelerated)
zstd = "0.12"
lz4_flex = "0.11" # Very fast compression

# TLS
rustls.workspace = true
tokio-rustls.workspace = true

# Networking
socket2 = "0.5"
rand = "0.8"

# QUIC (optional)
quinn = { version = "0.11", optional = true }
rcgen = { version = "0.12", optional = true }
rustls-pki-types = { version = "1", optional = true }

# io_uring (Linux only, optional)
tokio-uring = { version = "0.5", optional = true }
io-uring = { version = "0.6", optional = true }

# Connection pooling
dashmap = "5.5" # Concurrent hash map

# Timing and metrics
quanta = "0.12"  # High-precision timestamps
metrics = "0.21" # Metrics collection

# Utilities
uuid = { version = "1", features = ["v4", "serde"] }
parking_lot = "0.12"                                 # Fast synchronization primitives
crossbeam-channel = "0.5"                            # Lock-free channels
crossbeam-queue = "0.3"                              # Lock-free queues

# WebSocket
tokio-tungstenite = { version = "0.24", features = ["native-tls"] }

# Internal dependencies
spine-protocol = { path = "../spine-protocol" }

[dev-dependencies]
criterion = { version = "0.5", features = ["async_tokio"] }
tokio-test = "0.4"
rand = "0.8"
proptest = "1.11"
aes-gcm = "0.10"
h2 = "0.4"
http = "1"

[[bench]]
name = "transport_bench"
harness = false

[[bench]]
name = "tcp_comparison"
harness = false

[[bench]]
name = "traditional_comparison"
harness = false

[[bench]]
name = "network_realistic"
harness = false

[[bench]]
name = "spine_vs_www"
harness = false

[[bench]]
name = "spine_vs_http2"
harness = false

[[bench]]
name = "agentic_ai_workload"
harness = false

[[bench]]
name = "llm_tok_per_sec"
harness = false

[[bench]]
name = "llm_shm_ipc"
harness = false
