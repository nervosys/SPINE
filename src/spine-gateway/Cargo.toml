[package]
name = "spine-gateway"
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "OpenAPI REST gateway for SPINE — exposes agentic web APIs to non-Rust clients"
license.workspace = true

[[bin]]
name = "spine-gateway"
path = "src/main.rs"

[dependencies]
spine-agent = { path = "../spine-agent", version = "1.0.0" }
spine-protocol = { path = "../spine-protocol", version = "1.0.0" }
spine-parser = { path = "../spine-parser", version = "1.0.0" }
spine-compiler = { path = "../spine-compiler", version = "1.0.0" }
spine-core = { path = "../spine-core", version = "1.0.0" }
spine-transport = { path = "../spine-transport", version = "1.0.0" }

tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
log = { workspace = true }
env_logger = { workspace = true }
tracing = { workspace = true }

axum = { version = "0.7", features = ["json", "macros"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }
utoipa = { version = "4", features = ["axum_extras"] }
utoipa-swagger-ui = { version = "7", features = ["axum"] }
uuid = { version = "1", features = ["v4", "serde"] }
dashmap = "5"
futures = "0.3"
base64 = "0.22"
subtle = "2.5"
rustls = { workspace = true }

[features]
default = []

# Compile spine-gateway against the FIPS-shaped rustls provider stack.
#
# Federal deployments (CMMC / FedRAMP / IRAP) require a FIPS 140-3
# validated cryptographic module rather than `ring`. Enabling this
# feature:
#
# 1. Adds the `aws_lc_rs` feature to rustls so the AWS-LC backend
#    compiles in alongside the default `ring` paths.
# 2. Switches the gateway's startup logic to install `aws_lc_rs` as
#    the rustls default CryptoProvider — every TLS handshake the
#    binary performs uses AWS-LC's validated primitives.
#
# To reach an end-to-end FIPS-validated build the deployer must ALSO
# rebuild `aws-lc-rs` itself in FIPS mode (set `AWS_LC_FIPS=1` and
# follow the AWS-LC-FIPS toolchain instructions). The cargo feature
# alone wires SPINE's integration point; the validated module is a
# deployer-toolchain decision documented in SECURITY_AUDIT.md § 2.
fips = ["rustls/aws_lc_rs"]
