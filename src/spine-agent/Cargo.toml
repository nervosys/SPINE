[package]
name = "spine-agent"
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Agent interface for SPINE"

[dependencies]
spine-protocol = { path = "../spine-protocol", version = "1.0.0" }
spine-parser = { path = "../spine-parser", version = "1.0.0" }
spine-compiler = { path = "../spine-compiler", version = "1.0.0" }
spine-wasm = { path = "../spine-wasm", version = "1.0.0" }
spine-cluster = { path = "../spine-cluster", version = "1.0.0" }
spine-human = { path = "../spine-human", version = "1.0.0" }
spine-agentic = { path = "../spine-agentic", version = "1.0.0" }
spine-transport = { path = "../spine-transport", version = "1.0.0" }
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
log.workspace = true
env_logger.workspace = true
tokio.workspace = true
rustls.workspace = true
tokio-rustls.workspace = true
rustls-pemfile.workspace = true
rustls-native-certs = "0.6"
tracing = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }


[dev-dependencies]
spine-nostd = { path = "../spine-nostd" }
spine-embedded = { path = "../spine-embedded" }
spine-kernel = { path = "../spine-kernel" }
