[package]
name = "spine-agent"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Agent interface for SPINE"

[dependencies]
spine-protocol = { path = "../spine-protocol" }
spine-parser = { path = "../spine-parser" }
spine-compiler = { path = "../spine-compiler" }
spine-wasm = { path = "../spine-wasm" }
spine-cluster = { path = "../spine-cluster" }
spine-human = { path = "../spine-human" }
spine-agentic = { path = "../spine-agentic" }
spine-transport = { path = "../spine-transport" }
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
log.workspace = true
env_logger.workspace = true
tokio.workspace = true
rustls.workspace = true
tokio-rustls.workspace = true
rustls-pemfile.workspace = true
rustls-native-certs = "0.6"
tracing = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }


[dev-dependencies]
spine-nostd = { path = "../spine-nostd" }
spine-embedded = { path = "../spine-embedded" }
spine-kernel = { path = "../spine-kernel" }
