[package]
name = "spine-agentic"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "The SPINE Agentic Web Stack - A bioinspired paradigm for agent-native web interaction"

[dependencies]
tracing = { workspace = true }
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
thiserror.workspace = true
log.workspace = true
tokio.workspace = true
rand.workspace = true
sha2.workspace = true
ed25519-dalek.workspace = true

# Internal dependencies
spine-neural = { path = "../spine-neural" }
spine-crypto = { path = "../spine-crypto" }
spine-protocol = { path = "../spine-protocol" }
spine-compiler = { path = "../spine-compiler" }
spine-knowledge = { path = "../spine-knowledge" }

# Agent-specific
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
dashmap = "5.5"
petgraph = "0.6"
url = { version = "2", features = ["serde"] }
regex = "1.10"
futures = "0.3"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
sha2 = "0.10"

[[bench]]
name = "scalability_bench"
harness = false

[[example]]
name = "agentic_web_demo"
path = "examples/agentic_web_demo.rs"

[[example]]
name = "autonomous_agent"
path = "examples/agentic_autonomous.rs"

[[example]]
name = "swarm_intelligence"
path = "examples/swarm_intelligence.rs"

[[example]]
name = "advanced_agentic"
path = "examples/advanced_agentic.rs"

