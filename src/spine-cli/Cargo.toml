[package]
name = "spine-cli"
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Command-line interface for the SPINE agentic web stack"

[[bin]]
name = "spine"
path = "src/main.rs"

[dependencies]
spine-agent = { path = "../spine-agent", version = "1.0.0" }
spine-protocol = { path = "../spine-protocol", version = "1.0.0" }
spine-parser = { path = "../spine-parser", version = "1.0.0" }
spine-core = { path = "../spine-core", version = "1.0.0" }
spine-transport = { path = "../spine-transport", version = "1.0.0" }
clap = { version = "4", features = ["derive"] }
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
env_logger.workspace = true
log.workspace = true
toml = "0.8"
colored = "2"
indicatif = "0.17"
tabled = "0.16"
uuid = { version = "1", features = ["v4"] }
reqwest = { workspace = true }
rustls-pemfile = "2"
tokio-rustls = { workspace = true }

[dev-dependencies]
tempfile = "3"
