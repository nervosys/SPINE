<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>SPINE Agent Bridge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      color: #58a6ff;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot.connected { background: #3fb950; }
    .dot.disconnected { background: #f85149; }
    .dot.error { background: #d29922; }
    .section {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .section h2 {
      font-size: 12px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    label {
      font-size: 13px;
      color: #8b949e;
      display: block;
      margin-bottom: 4px;
    }
    input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #c9d1d9;
      font-size: 13px;
      margin-bottom: 8px;
    }
    input:focus { outline: none; border-color: #58a6ff; }
    button {
      padding: 6px 12px;
      border-radius: 4px;
      border: none;
      font-size: 13px;
      cursor: pointer;
      margin-right: 4px;
    }
    .btn-primary {
      background: #238636;
      color: #fff;
    }
    .btn-primary:hover { background: #2ea043; }
    .btn-danger {
      background: #da3633;
      color: #fff;
    }
    .btn-danger:hover { background: #f85149; }
    .btn-secondary {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
    }
    .btn-secondary:hover { background: #30363d; }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .stat {
      text-align: center;
    }
    .stat .value {
      font-size: 18px;
      font-weight: bold;
      color: #58a6ff;
    }
    .stat .label {
      font-size: 11px;
      color: #8b949e;
    }
    #ur-preview {
      max-height: 150px;
      overflow-y: auto;
      font-size: 12px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 8px;
      white-space: pre-wrap;
      word-break: break-word;
      color: #8b949e;
    }
    .actions { display: flex; gap: 4px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <h1>
    <span class="dot disconnected" id="status-dot"></span>
    SPINE Agent Bridge
  </h1>

  <div class="section">
    <h2>Connection</h2>
    <label for="ws-url">SPINE Node URL</label>
    <input type="text" id="ws-url" value="ws://localhost:9800/ws" placeholder="ws://host:port/ws">
    <div class="actions">
      <button class="btn-primary" id="btn-connect">Connect</button>
      <button class="btn-danger" id="btn-disconnect">Disconnect</button>
    </div>
  </div>

  <div class="section">
    <h2>Statistics</h2>
    <div class="stats">
      <div class="stat">
        <div class="value" id="stat-sent">0</div>
        <div class="label">Sent</div>
      </div>
      <div class="stat">
        <div class="value" id="stat-recv">0</div>
        <div class="label">Received</div>
      </div>
      <div class="stat">
        <div class="value" id="stat-err">0</div>
        <div class="label">Errors</div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Page UR</h2>
    <div id="ur-preview">Not extracted yet</div>
    <br>
    <div class="actions">
      <button class="btn-secondary" id="btn-extract">Extract UR</button>
      <button class="btn-secondary" id="btn-send-ur">Send to Agent</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
