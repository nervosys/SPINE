[workspace]
members = [
    "hyperlight-core",
    "hyperlight-parser",
    "hyperlight-protocol",
    "hyperlight-agent",
    "hyperlight-compiler",
    "hyperlight-wasm",
    "hyperlight-cluster",
    "hyperlight-neural",
    "hyperlight-crypto", "hyperlight-human", "hyperlight-browser",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Hyperlight Team"]
description = "An agentic AI web browser stack"
license = "MIT"

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
thiserror = "1.0"
log = "0.4"
env_logger = "0.10"
reqwest = { version = "0.11", features = ["json"] }
wasmtime = "27"
wat = "1"
rand = "0.8"
sha2 = "0.10"
