# cargo-deny configuration (v0.19+)
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Ignore specific advisories by RUSTSEC ID
ignore = [
    # bytes: integer overflow in BytesMut::reserve — transitive via tokio
    "RUSTSEC-2026-0007",
    # protobuf: stack recursion DoS — transitive via wasmtime
    "RUSTSEC-2024-0437",
    # serde_json: stack exhaustion DoS — transitive
    "RUSTSEC-2026-0009",
    # wasmtime: fd_renumber host panic — we don't expose WASIp1
    "RUSTSEC-2025-0046",
    # wasmtime: shared linear memory unsoundness — we don't use shared memory
    "RUSTSEC-2025-0118",
    # bincode unmaintained — pinned to v1.x, stable API
    "RUSTSEC-2025-0141",
    # derivative unmaintained — transitive
    "RUSTSEC-2024-0388",
    # fxhash unmaintained — transitive via criterion
    "RUSTSEC-2025-0057",
    # instant unmaintained — transitive via criterion/parking_lot
    "RUSTSEC-2024-0384",
    # number_prefix unmaintained — transitive via indicatif
    "RUSTSEC-2025-0119",
    # paste unmaintained — transitive
    "RUSTSEC-2024-0436",
    # proc-macro-error unmaintained — transitive
    "RUSTSEC-2024-0370",
    # rustls-pemfile unmaintained — transitive via rustls
    "RUSTSEC-2025-0134",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "OFL-1.1",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

# Workspace crates use Apache-2.0 (from workspace root LICENSE)
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# epaint bundles fonts (OFL-1.1, Ubuntu Font License — permissive, manually reviewed)
[[licenses.exceptions]]
name = "epaint"
allow = ["LicenseRef-UFL-1.0"]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
