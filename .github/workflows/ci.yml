name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (all targets)
        run: cargo clippy --workspace --exclude spine-browser --all-targets -- -D warnings

  # ── Security Audit ─────────────────────────────────────────────────────────
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-test-

      - name: Build workspace
        run: cargo build --workspace --exclude spine-browser --target ${{ matrix.target }}

      - name: Run tests (lib + integration)
        if: matrix.target != 'aarch64-apple-darwin'
        run: cargo test --workspace --exclude spine-browser --lib --tests --target ${{ matrix.target }}

      - name: Run doc tests
        if: matrix.target != 'aarch64-apple-darwin'
        run: cargo test --workspace --exclude spine-browser --doc --target ${{ matrix.target }}

  # ── Build Release Binaries ─────────────────────────────────────────────────
  build:
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: spine-linux-x64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: spine-windows-x64
            ext: ".exe"
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: spine-macos-arm64
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-release-

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p spine-core -p spine-cli -p spine-gateway

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/spine-core${{ matrix.ext }} dist/${{ matrix.artifact }}/
          cp target/${{ matrix.target }}/release/spine${{ matrix.ext }} dist/${{ matrix.artifact }}/
          cp target/${{ matrix.target }}/release/spine-gateway${{ matrix.ext }} dist/${{ matrix.artifact }}/
          cp README.md ARCHITECTURE.md HLS_SPEC.md THREAT_MODEL.md dist/${{ matrix.artifact }}/
          cd dist && tar -czvf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/${{ matrix.artifact }}
          Copy-Item target/${{ matrix.target }}/release/spine-core${{ matrix.ext }} dist/${{ matrix.artifact }}/
          Copy-Item target/${{ matrix.target }}/release/spine${{ matrix.ext }} dist/${{ matrix.artifact }}/
          Copy-Item target/${{ matrix.target }}/release/spine-gateway${{ matrix.ext }} dist/${{ matrix.artifact }}/
          Copy-Item README.md, ARCHITECTURE.md, HLS_SPEC.md, THREAT_MODEL.md dist/${{ matrix.artifact }}/
          Compress-Archive -Path dist/${{ matrix.artifact }} -DestinationPath dist/${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.*

  # ── Docker ──────────────────────────────────────────────────────────────────
  docker:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t spine:ci .

      - name: Verify container starts
        run: |
          docker run -d --name spine-test -p 8080:8080 spine:ci
          sleep 3
          docker logs spine-test
          docker stop spine-test

  # ── Documentation ───────────────────────────────────────────────────────────
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-docs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-docs-

      - name: Build API docs
        run: cargo doc --workspace --exclude spine-browser --no-deps

      - uses: actions/upload-artifact@v4
        with:
          name: api-documentation
          path: target/doc

  # ── Release ─────────────────────────────────────────────────────────────────
  release:
    needs: [build, docker, docs]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/spine-linux-x64/*.tar.gz
            artifacts/spine-windows-x64/*.zip
            artifacts/spine-macos-arm64/*.tar.gz
