{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "spine.fullname" . }}
  labels:
    {{- include "spine.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "spine.fullname" . }}
  labels:
    {{- include "spine.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "spine.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "spine.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
